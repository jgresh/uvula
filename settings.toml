# uvula settings — edit to match your setup
#
# Do not commit this file to git (it's in .gitignore).
# Copy settings.toml.example for a clean template.

# Starting target UV dose (raw LTR390 counts)
# You'll tune this through test strips — start here and adjust
UVULA_TARGET_DEFAULT = 1000

# Set to 0 to silence the buzzer (e.g. during late-night printing)
UVULA_BUZZER_ENABLED = 1

# Set to 0 to disable CSV logging (session_log.csv will not be written)
UVULA_LOG_ENABLED = 1

# WiFi credentials — used for NTP time sync at boot (Pico W only)
# Remove the leading # and fill in your network details
CIRCUITPY_WIFI_SSID = "applegarth"
CIRCUITPY_WIFI_PASSWORD = "menegroth"

# Your UTC offset in hours (e.g. -5 for EST, -8 for PST, 1 for CET)
# Used to set local time in the log file after NTP sync
UVULA_TZ_OFFSET = 0
                                                            
# open http://circuitpython.local and you get a file editor.
CIRCUITPY_WEB_API_PASSWORD = "menegroth"